<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>刀刃漫游</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="game-shell">
    <canvas id="game" aria-label="刀刃漫游游戏画布"></canvas>
    <section class="hud hud-top">
      <div class="panel stats">
        <span>生存 <b id="surviveTime">0.0s</b></span>
        <span>击败 <b id="killCount">0</b></span>
        <span>持刀 <b id="bladeCount">0</b></span>
        <button id="settingsToggle" class="hud-button" type="button">设置</button>
      </div>
    </section>
    <section class="settings-panel hidden" id="settingsPanel" aria-label="游戏设置">
      <div class="panel settings-card">
        <div class="settings-row">
          <label for="maxBladesInput">最大持剑数</label>
          <input id="maxBladesInput" type="number" min="1" max="32" step="1" value="15">
        </div>
        <div class="settings-row">
          <label for="maxEnemyDropInput">最多爆出几把剑</label>
          <input id="maxEnemyDropInput" type="number" min="1" max="5" step="1" value="2">
        </div>
        <label class="settings-check" for="showHitboxInput">
          <input id="showHitboxInput" type="checkbox">
          <span>显示 hit box</span>
        </label>
        <label class="settings-check" for="showHelpInput">
          <input id="showHelpInput" type="checkbox">
          <span>显示帮助</span>
        </label>
        <div class="settings-probabilities">
          <span class="settings-label">掉剑数量概率（0-1，总和不超过 1）</span>
          <div id="dropChanceList" class="settings-probability-list"></div>
          <span id="dropChanceSummary" class="settings-summary"></span>
        </div>
        <div class="settings-actions">
          <button id="settingsCancel" class="settings-button settings-button-secondary" type="button">取消</button>
          <button id="settingsConfirm" class="settings-button" type="button">确定</button>
        </div>
      </div>
    </section>
    <section class="hud hud-bottom hidden" id="helpPanel">
      <div class="panel controls">
        <span>移动：WASD / 方向键 / 左侧触控摇杆</span>
        <span>规则：拾刀后随机获得 1-5 把旋转刀，刀对刀可互相抵消，刀碰树木会碎裂</span>
        <span>设置：可临时修改持剑上限、敌人掉剑分布和是否显示 hit box</span>
      </div>
    </section>
    <section class="overlay" id="overlay">
      <div class="overlay-card">
        <h1>刀刃漫游</h1>
        <p>在无限延展的像素地图中移动，抢刀、绕刀、卡空隙。</p>
        <p>敌人也会抢地上的刀，并主动追你。你的刀墙一旦出现缺口，被敌刀碰到就会直接阵亡。</p>
        <button id="restartButton" type="button">开始游戏</button>
      </div>
    </section>
  </main>
  <script src="game.js?v=20260521-sheet-fix"></script>
</body>
</html>
